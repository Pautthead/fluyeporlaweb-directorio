# GitHub Action: actualización semanal de datos de repos
# Ruta final en el repo: .github/workflows/update-github-data.yml
#
# Qué hace: recorre todos los .md de src/content/herramientas con github_url,
# llama a la API de GitHub, actualiza stars/forks/last_commit/version y hace commit.
# Cloudflare Pages redespliega solo al detectar el push.

name: Actualizar datos de GitHub

on:
  schedule:
    - cron: '0 4 * * 1'   # lunes 04:00 UTC
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install gray-matter

      - name: Actualizar datos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github-data.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/herramientas
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: actualización automática de datos de GitHub"
            git push
          fi

